name: ansible-setup

on:
  workflow_dispatch:
    inputs:
      s3_uri:
        description: "Full s3:// URI of the qcow2 base image"
        required: true
        type: string
      image_filename:
        description: "Local filename to save the image as"
        required: true
        default: seapath-debian.qcow2
        type: string
      s3_host:
        description: "S3 host (e.g. s3.fr1.next.ink). Leave blank for AWS S3."
        required: false
        default: ""
        type: string
      ansible_repo:
        description: "SEAPATH Ansible repo URL to clone"
        required: false
        default: "https://github.com/seapath/ansible.git"
        type: string
      ansible_ref:
        description: "Branch, tag or commit of the Ansible repo to check out"
        required: false
        default: "main"
        type: string

jobs:
  ansible-setup:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      LIBVIRT_DEFAULT_URI: qemu:///system
      ANSIBLE_HOST_KEY_CHECKING: "False"
      TF_CLI_ARGS_apply: "-auto-approve"
      TF_IN_AUTOMATION: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-kvm qemu-utils ovmf libvirt-daemon-system libvirt-clients \
            virtinst genisoimage \
            dnsmasq-base \
            openvswitch-switch \
            python3-libvirt python3-pip python3-venv \
            sshpass \
            netcat-openbsd \
            s3cmd \
            jq curl gnupg lsb-release \
            fence-virt fence-virtd
          # SEAPATH's prepare.sh requires ansible-core 2.16 exactly
          python3 -m pip install --break-system-packages \
            'ansible-core~=2.16.0' 'jmespath' 'netaddr' 'passlib'
          wget -O- https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update
          sudo apt-get install -y terraform

      - name: Enable libvirt + Open vSwitch and grant runner access
        run: |
          set -euxo pipefail
          sudo systemctl enable --now libvirtd openvswitch-switch
          sudo usermod -aG libvirt,kvm "$USER"
          echo "$USER ALL=(ALL) NOPASSWD: /usr/bin/ovs-vsctl, /usr/bin/ovs-ofctl" \
            | sudo tee /etc/sudoers.d/runner-ovs
          sudo chmod 0440 /etc/sudoers.d/runner-ovs
          ls -l /dev/kvm

      - name: Configure and start fence_virtd on CI host
        run: |
          set -euxo pipefail
          mkdir -p /tmp/fence
          dd if=/dev/urandom bs=32 count=1 of=/tmp/fence/fence_virt.key
          chmod 400 /tmp/fence/fence_virt.key
          sudo mkdir -p /etc/cluster
          sudo cp /tmp/fence/fence_virt.key /etc/cluster/fence_virt.key
          sudo chmod 0400 /etc/cluster/fence_virt.key
          cat | sudo tee /etc/fence_virt.conf <<'FENCECONF'
          fence_virtd {
              listener = "tcp";
              backend = "libvirt";
              module_path = "/usr/lib/x86_64-linux-gnu/fence-virt";
          }

          listeners {
              tcp {
                  key_file = "/etc/cluster/fence_virt.key";
                  port = "1229";
                  address = "0.0.0.0";
                  family = "ipv4";
              }
          }

          backends {
              libvirt {
                  uri = "qemu:///system";
              }
          }
          FENCECONF
          sudo ufw allow 1229/tcp || true
          sudo systemctl enable --now fence_virtd
          sudo systemctl status fence_virtd --no-pager

      - name: Create libvirt 'default' storage pool
        run: |
          set -euxo pipefail
          sudo mkdir -p /var/lib/libvirt/images
          if ! sudo virsh pool-info default >/dev/null 2>&1; then
            sudo virsh pool-define-as default dir --target /var/lib/libvirt/images
            sudo virsh pool-build default
            sudo virsh pool-start default
            sudo virsh pool-autostart default
          fi
          sudo virsh pool-list --all

      - name: Fetch base image from S3
        env:
          ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          SECRET_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_HOST: ${{ inputs.s3_host }}
          S3_URI: ${{ inputs.s3_uri }}
          IMAGE_FILENAME: ${{ inputs.image_filename }}
        run: |
          set -euo pipefail
          mkdir -p images
          host_args=()
          if [ -n "$S3_HOST" ]; then
            host_args=(--host="$S3_HOST" --host-bucket="%(bucket)s.$S3_HOST")
          fi
          s3cmd get "$S3_URI" "images/$IMAGE_FILENAME" \
            --access_key="$ACCESS_KEY" \
            --secret_key="$SECRET_KEY" \
            "${host_args[@]}"
          sudo chmod a+r "images/$IMAGE_FILENAME"

      - name: Write terraform.tfvars
        run: |
          cat > terraform/terraform.tfvars <<EOF
          base_image_path = "${{ github.workspace }}/images/${{ inputs.image_filename }}"
          EOF
          cat terraform/terraform.tfvars

      - name: Install SSH private key for ansible user
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SEAPATH_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub

      - name: Clone and prepare SEAPATH Ansible repo
        env:
          ANSIBLE_REPO_URL: ${{ inputs.ansible_repo }}
          ANSIBLE_REF: ${{ inputs.ansible_ref }}
        run: |
          set -euxo pipefail
          git clone --depth=1 --branch "$ANSIBLE_REF" "$ANSIBLE_REPO_URL" ansible
          cd ansible && ./prepare.sh

      - name: Terraform init + apply (provision VMs)
        run: sg libvirt -c 'make init && make apply'

      - name: Start VMs and networks
        run: sg libvirt -c 'make start'

      - name: Wait for SSH on all nodes
        run: |
          set -euxo pipefail
          for ip in 192.168.100.101 192.168.100.102 192.168.100.103; do
            echo "Waiting for $ip:22..."
            for i in $(seq 1 60); do
              if nc -z -w 2 "$ip" 22; then
                echo "  $ip is reachable"
                break
              fi
              sleep 5
              if [ "$i" -eq 60 ]; then
                echo "Timed out waiting for $ip"
                exit 1
              fi
            done
            done

      - name: Grow root partition and filesystem
        run: sg libvirt -c 'make ansible-grow-rootfs'

      - name: Push fencing key to VMs
        run: |
          set -euxo pipefail
          for ip in 192.168.100.101 192.168.100.102 192.168.100.103; do
            echo "Pushing fence key to $ip..."
            scp -o StrictHostKeyChecking=no \
              /tmp/fence/fence_virt.key \
              "ansible@$ip:/tmp/fence_virt.key"
            ssh -o StrictHostKeyChecking=no "ansible@$ip" \
              "sudo /bin/sh -c 'apt-get update -qq 2>/dev/null; apt-get install -y -qq fence-virt 2>/dev/null; mkdir -p /etc/cluster; mv /tmp/fence_virt.key /etc/cluster/fence_virt.key; chmod 400 /etc/cluster/fence_virt.key'"
          done

      - name: ansible-ping
        run: sg libvirt -c 'make ansible-ping'

      - name: ansible-setup
        run: sg libvirt -c 'make ansible-setup'

      - name: Verify STONITH fencing
        if: success()
        run: |
          set -euxo pipefail
          SSH="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          echo "=== Check fence_virt binary on node1 ==="
          $SSH ansible@192.168.100.101 'test -x /usr/sbin/fence_virt && echo "fence_virt found" || echo "fence_virt NOT found"'

          echo "=== Check stonith-enabled ==="
          $SSH ansible@192.168.100.101 "sudo /bin/sh -c 'crm configure show'" | grep 'stonith-enabled=true'

          echo "=== Check stonith resources are started ==="
          for node in node1 node2 node3; do
            echo "  stonith-$node:"
            $SSH ansible@192.168.100.101 "sudo /bin/sh -c 'crm resource status stonith-$node'" || echo "  (not started)"
          done

          echo "=== Fencing topology ==="
          for node in node1 node2 node3; do
            echo "  Devices that can fence $node:"
            $SSH ansible@192.168.100.101 "sudo /bin/sh -c 'stonith_admin --list $node'" || echo "  (none)"
          done

          echo "=== Test fence_virt connectivity to fence_virtd ==="
          $SSH ansible@192.168.100.102 "sudo /bin/sh -c 'fence_virt -T 192.168.100.1 -p 1229 -k /etc/cluster/fence_virt.key -o list'" || echo "  (list failed)"

          echo "=== STONITH verification complete ==="

      - name: Diagnostics on failure
        if: failure()
        run: |
          set +e
          sudo virsh -c qemu:///system list --all
          sudo virsh -c qemu:///system net-list --all
          sudo ovs-vsctl show
          sudo journalctl -u libvirtd --no-pager | tail -300
          for n in seapath-node1 seapath-node2 seapath-node3; do
            echo "=== $n ==="
            sudo virsh -c qemu:///system dominfo "$n"
          done
          free -h
          df -h
